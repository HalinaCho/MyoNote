<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Teal rounded square background -->
  <rect width="512" height="512" rx="110" fill="#10bcad"/>

  <!-- Eye: outer almond shape (FA-style bold stroke) -->
  <path d="M 72,256
           C 130,180 190,168 256,168
           C 322,168 382,180 440,256
           C 382,332 322,344 256,344
           C 190,344 130,332 72,256 Z"
        fill="none"
        stroke="white"
        stroke-width="28"
        stroke-linejoin="round"/>

  <!-- Eye: iris ring -->
  <circle cx="256" cy="256" r="66"
          fill="none"
          stroke="white"
          stroke-width="28"/>

  <!-- Clipboard as the pupil -->
  <!-- Top clip band -->
  <rect x="241" y="234" width="30" height="16" rx="5" fill="white"/>
  <!-- Clip ring hole -->
  <circle cx="256" cy="241" r="5" fill="#10bcad"/>
  <!-- Clipboard body -->
  <rect x="227" y="244" width="58" height="48" rx="7" fill="white"/>
  <!-- Note lines -->
  <line x1="237" y1="257" x2="275" y2="257" stroke="#10bcad" stroke-width="5" stroke-linecap="round"/>
  <line x1="237" y1="268" x2="275" y2="268" stroke="#10bcad" stroke-width="5" stroke-linecap="round"/>
  <line x1="237" y1="279" x2="275" y2="279" stroke="#10bcad" stroke-width="5" stroke-linecap="round"/>
</svg>
