<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Teal rounded square background -->
  <rect width="512" height="512" rx="100" fill="#10bcad"/>

  <!-- Notepad body (white) -->
  <rect x="90" y="108" width="332" height="356" rx="22" fill="white"/>

  <!-- Clipboard clip tab at top center (sticks up above notepad) -->
  <rect x="206" y="84" width="100" height="46" rx="12" fill="#0b8a82"/>
  <rect x="222" y="92" width="68" height="30" rx="8" fill="#10bcad"/>

  <!-- Eye: sclera (light teal fill) -->
  <circle cx="256" cy="300" r="92" fill="#cbede9"/>

  <!-- Eye: upper eyelid cap (dark teal filled top-half) -->
  <path d="M 164,300 A 92,92 0 0,1 348,300 Z" fill="#0a6e68"/>

  <!-- Eye: small eyelash flicks at lid ends -->
  <path d="M 164,300 Q 148,278 156,258" fill="none" stroke="#0a6e68" stroke-width="10" stroke-linecap="round"/>
  <path d="M 348,300 Q 364,278 356,258" fill="none" stroke="#0a6e68" stroke-width="10" stroke-linecap="round"/>

  <!-- Eye: iris ring -->
  <circle cx="256" cy="316" r="48" fill="#cbede9" stroke="#0a6e68" stroke-width="14"/>

  <!-- Eye: pupil -->
  <circle cx="256" cy="316" r="21" fill="#0a6e68"/>

  <!-- Note lines below eye (inside notepad) -->
  <rect x="138" y="416" width="160" height="10" rx="5" fill="#a0ddd7"/>
  <rect x="138" y="438" width="110" height="10" rx="5" fill="#a0ddd7"/>
</svg>
